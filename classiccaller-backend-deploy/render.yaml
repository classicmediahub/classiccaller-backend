services:
  - type: web
    name: classiccaller-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: classiccaller-db
          property: connectionString
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: AT_CALLER_ID
        sync: false
      - key: AT_ENVIRONMENT
        value: sandbox
      - key: DEFAULT_RATE_PER_MINUTE
        value: "0.02"
      - key: FRONTEND_URL
        sync: false
      - key: BASE_URL
        sync: false

databases:
  - name: classiccaller-db
    plan: free
    databaseName: classiccaller
